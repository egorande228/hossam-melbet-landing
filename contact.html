    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ContactPage",
        "name": "MelBet Partnerships Contact Form",
        "url": "https://paypartnersmelbet.com/contact",
        "isPartOf": {
          "@type": "WebSite",
          "name": "MelBet Partnerships",
          "url": "https://paypartnersmelbet.com/"
        }
      }
    </script>
    <script>
      (function () {
        const langStorageKey = 'melbet_lang';
        const visitorStorageKey = 'melbet_returning_visitor';
        const isoLangMap = {
          eng: 'en',
          arab: 'ar',
          franch: 'fr',
          esp: 'es',
          farsi: 'fa',
          mongol: 'mn',
          somali: 'so',
          portug: 'pt',
          amharic: 'am',
          turk: 'tr',
          russian: 'ru'
        };

        let rawLanguage = 'eng';
        let userType = 'new_visitor';
        try {
          rawLanguage = localStorage.getItem(langStorageKey) || 'eng';
          userType = localStorage.getItem(visitorStorageKey) ? 'returning_visitor' : 'new_visitor';
          localStorage.setItem(visitorStorageKey, '1');
        } catch (_) {}
        const contentLanguage = isoLangMap[rawLanguage] || 'en';
        const targetCountry = rawLanguage === 'mongol' ? 'mongolia' : 'unknow';
        window.__melbetTrackingContext = {
          rawLanguage,
          contentLanguage,
          targetCountry,
          pageType: 'contact',
          userType
        };
        window.dataLayer = window.dataLayer || [];
        window.dataLayer.push({
          content_language: contentLanguage,
          target_country: targetCountry,
          page_type: 'contact',
          user_type: userType
        });
      })();
    </script>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-9EQ8GXE5MW"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-9EQ8GXE5MW');
    </script>
    <link rel="icon" href="/favicon.svg?v=1" type="image/svg+xml" />
    <link rel="shortcut icon" href="/favicon.svg?v=1" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sarala:wght@400;700&family=Tajawal:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/styles.css?v=19" />
    <link rel="stylesheet" href="./css/contact.css?v=8" />
  </head>
  <body>
    <header class="site-header" id="top">
      <div class="container header-inner">
        <a class="logo" href="./index.html#home" aria-label="MelBet home">
          <img src="./assets/logo-partnerships.svg?v=4" alt="MelBet Partnerships" />
        </a>

        <button class="menu-toggle" type="button" aria-label="Toggle menu" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>

        <nav class="site-nav" aria-label="Main navigation">
          <a href="./index.html#home">Home</a>
          <a href="./index.html#programs">Programs</a>
          <a href="./index.html#benefits">Benefits</a>
          <a href="./index.html#faq">FAQ</a>
          <a href="./contact" class="active">Contact</a>
        </nav>

        <div class="lang-switcher">
          <label class="sr-only" for="lang-select">Language</label>
          <select id="lang-select" aria-label="Language selector">
            <option value="eng">English</option>
            <option value="arab">العربية</option>
            <option value="franch">Français</option>
            <option value="esp">Español</option>
            <option value="farsi">فارسی</option>
            <option value="mongol">Монгол хэл</option>
            <option value="somali">Af-Soomaali</option>
            <option value="portug">Português</option>
            <option value="amharic">አማርኛ</option>
            <option value="turk">Türkçe</option>
            <option value="russian">Русский</option>
          </select>
        </div>

        <a class="btn btn-small" href="#partner-form">Fill The Form</a>
      </div>
    </header>

    <main>
      <section class="section form-hero">
        <div class="container">
          <p class="section-kicker">Contact</p>
          <h1>Become a MelBet Partner</h1>
          <p class="hero-copy">
            Fill out the application form below. Our team will review your request and contact you
            within 24 hours.
          </p>
        </div>
      </section>

      <section class="section" id="partner-form">
        <div class="container">
          <form
            class="partner-form"
            action="javascript:void(0);"
            method="post"
            novalidate
            data-sheet-endpoint="https://script.google.com/macros/s/AKfycbwhODWcV31D3syrvjQHP4DYyGsybRyN8BsWfQx9Yjr_-dtHe1Ghv0BTZcD_U8OlcSeuoQ/exec"
          >
            <div class="form-grid two-col">
              <label>
                <span>First Name *</span>
                <input type="text" name="first_name" minlength="2" required />
              </label>
              <label>
                <span>Last Name *</span>
                <input type="text" name="last_name" minlength="2" required />
              </label>
            </div>

            <div class="form-grid two-col">
              <label>
                <span>Email Address *</span>
                <input type="email" name="email" required />
              </label>
              <label>
                <span>Phone Number *</span>
                <input
                  type="tel"
                  name="phone"
                  required
                  inputmode="tel"
                  pattern="\+?[0-9\s()-]{8,20}"
                  title="Use digits only, for example +79293737172"
                />
              </label>
            </div>

            <div class="form-grid two-col">
              <label>
                <span>Country *</span>
                <input type="text" name="country" minlength="2" required list="country-options" />
              </label>
              <label>
                <span>Partnership Program *</span>
                <select name="program" required>
                  <option value="">Select a program</option>
                  <option value="Affiliate Partner Program">Affiliate Partner Program</option>
                  <option value="Teamcash program">Teamcash program</option>
                  <option value="E-payment Agent Program">E-payment Agent Program</option>
                </select>
              </label>
            </div>

            <label>
              <span>Traffic Source / Experience</span>
              <input type="text" name="traffic_source" placeholder="e.g. Facebook Ads, SEO, Telegram" />
            </label>

            <label>
              <span>Message *</span>
              <textarea
                name="message"
                rows="5"
                required
                minlength="5"
                placeholder="Tell us more about your goals and GEOs"
              ></textarea>
            </label>

            <div class="hp-field" aria-hidden="true">
              <label>
                <span>Website</span>
                <input type="text" name="website" tabindex="-1" autocomplete="off" />
              </label>
            </div>

            <datalist id="country-options"></datalist>

            <label class="consent">
              <input type="checkbox" name="consent" required />
              <span>
                I agree to the
                <a
                  href="https://melbet.com/en/information/rules/1"
                  target="_blank"
                  rel="noopener noreferrer"
                  >Terms &amp; Conditions</a
                >
                and
                <a
                  href="https://melbet.com/en/information/rules/privacy_policy"
                  target="_blank"
                  rel="noopener noreferrer"
                  >Privacy Policy</a
                >
                *
              </span>
            </label>

            <label class="consent consent-optional">
              <input type="checkbox" name="updates_opt_in" />
              <span>I would like to receive updates about partnership opportunities and promotions.</span>
            </label>

            <div class="form-actions">
              <button class="btn" type="submit">Submit Application</button>
              <a class="btn btn-ghost" href="./index.html#home">Back to Main Page</a>
            </div>
            <p class="form-status" role="status" aria-live="polite"></p>
          </form>
        </div>
      </section>
    </main>

    <aside class="chat-dock" aria-label="Quick chat">
      <a
        class="chat-dock-link chat-dock-link-tg"
        href="https://t.me/team_cash_melbet_bot"
        target="_blank"
        rel="noopener noreferrer"
        data-track-telegram
        data-cta-location="footer"
        aria-label="Open Telegram"
        >Telegram</a
      >
    </aside>

    <script src="./js/i18n.js?v=14"></script>
    <script src="./js/tracking.js?v=1"></script>
    <script src="./js/contact.js?v=17"></script>
  </body>
</html>
